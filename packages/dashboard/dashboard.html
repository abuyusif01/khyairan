<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khyairan Admin</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; }
      .site-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: #1a1a1a; color: #fff; }
      .site-name { font-weight: 600; }
      .logout-btn { background: transparent; border: 1px solid #555; color: #fff; padding: 0.35rem 0.75rem; border-radius: 4px; cursor: pointer; }
      .site-nav { background: #fff; border-bottom: 1px solid #e5e5e5; }
      .site-nav a { display: inline-block; padding: 0.75rem 1rem; color: #333; text-decoration: none; font-size: 0.9rem; }
      .site-nav a:hover { background: #f5f5f5; }
      .site-content { padding: 1rem; }
      .loading { padding: 2rem; text-align: center; color: #666; }
    </style>
  </head>
  <body>
    <div id="app">
      <p class="loading">Loading…</p>
    </div>
    <script type="module" src="/src/dashboard.ts"></script>
  </body>
</html>
