<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khyairan Admin</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      .login-card { background: #fff; padding: 2rem; border-radius: 8px; width: 100%; max-width: 360px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
      h1 { font-size: 1.25rem; margin-bottom: 1.5rem; }
      label { display: block; font-size: 0.875rem; margin-bottom: 0.25rem; }
      input { display: block; width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem; }
      button { width: 100%; padding: 0.6rem; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { color: #c00; font-size: 0.875rem; margin-top: 0.75rem; }
    </style>
  </head>
  <body>
    <div class="login-card" x-data="login()" x-init="init()">
      <h1>Khyairan Admin</h1>

      <!-- Normal login -->
      <form @submit.prevent="submit()" x-show="mode === 'login'">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" x-model="email" autocomplete="email" required />
        <label for="password">Password</label>
        <input id="password" type="password" name="password" x-model="password" autocomplete="current-password" required />
        <button type="submit" :disabled="loading" x-text="loading ? 'Signing in…' : 'Sign in'"></button>
        <p class="error" x-show="error" x-text="error"></p>
      </form>

      <!-- Invite — set password -->
      <form @submit.prevent="setPassword()" x-show="mode === 'set-password'">
        <p style="font-size:0.85rem;color:#555;margin-bottom:1.25rem;">Welcome! Set a password to activate your account.</p>
        <label for="new-password">Password</label>
        <input id="new-password" type="password" x-model="newPassword" autocomplete="new-password" minlength="8" required />
        <label for="confirm-password">Confirm password</label>
        <input id="confirm-password" type="password" x-model="confirmPassword" autocomplete="new-password" minlength="8" required />
        <button type="submit" :disabled="loading" x-text="loading ? 'Saving…' : 'Set password'"></button>
        <p class="error" x-show="error" x-text="error"></p>
      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
